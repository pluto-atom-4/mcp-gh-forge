name: AI Code Review

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: AI Code Review
    runs-on: ubuntu-latest
    # Only auto-approve PRs created by personal account, only once CI has passed
    # (prevents external abuse and decouples approval from an actual quality gate)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'pluto-atom-4' &&
      github.event.workflow_run.event == 'pull_request'

    steps:
      - name: Find associated PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`,
              state: 'open'
            });
            const pr = pulls[0];
            if (!pr) {
              core.setFailed('No open PR found for branch ' + context.payload.workflow_run.head_branch);
              return;
            }
            core.setOutput('number', pr.number);
            console.log('PR: ' + pr.number);
            console.log('Author: ' + pr.user.login);
            console.log('Draft: ' + pr.draft);

      - name: Approve PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ steps.find-pr.outputs.number }},
              event: 'APPROVE',
              body: '✅ AI Code Review Approved\n\nCI passed (lint, format, secretlint, npm audit).\n\nReady for manual merge.'
            })
