name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run secretlint
      - run: npm audit --audit-level=high

  ai-review:
    name: AI Code Review
    needs: ci
    runs-on: ubuntu-latest
    # Only auto-approve PRs created by personal account (prevents external abuse).
    # needs: ci means this job never runs, let alone approves, unless CI passed.
    if: github.actor == 'pluto-atom-4' && github.event.pull_request.draft == false

    steps:
      - name: Approve PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.BOT_TOKEN }}
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE',
              body: '✅ AI Code Review Approved\n\nCI passed (lint, format, secretlint, npm audit).\n\nReady for manual merge.'
            })
